front:
  text: 古林禪師像皇圖鞏固帝道遐昌佛日增輝法輪常轉古林禪師語錄序吾佛說法四十九年未曾道隻字諸祖出廣長舌遍覆閻浮國土語句如雲蓋過量人建牙豎纛各闢乾坤不可以軌則求也古林和尚秉吹毛劍獨步大方一言半句珠圓玉潤霑著毒氣足以斷人命根其縱橫自在悉從自己胸襟流出不惟不效諸方簇錦攢花并不向佛祖喉下取氣誠闇室之寶炬迷津之慈航也師為竹菴和尚真子機契最湥開法吳門之蓮華寺道眼圓明鉗錘妙密洵足振興車溪金明之法道而有光於斷橋矣門人集其語錄問序於余余合掌曰何必矢上加尖以塗糊吾師乎雖然師之有語師之已形者也語之有錄語之已見者也已形已見者可以言知未形未見者不可以名求則所謂語錄者果安在乎學者不為語言文字所瞞則酬恩有地矣康熙癸丑仲春秀水羅真性敬書古林如禪師語錄序古林如禪師語錄目次像讚序啟傳卷一上堂卷二小參示眾卷三拈古頌古卷四機緣六問像讚行實雜著佛事自題者箇村僧神頭鬼臉手執白拂遭他撿點生平吐膽傾心換卻時人雙眼縱有丹青畫得來舌上風雷如電卷附刻金明師翁讚縱目皆詩譜條條似古風秋林看不厭獨坐小軒中辛亥秋蠡湖進老人手書永正老和尚讚水心洛洛鐵骨蒼蒼振婁東之新令挽濟北之頹綱揮玉麈天魔膽喪握金篦佛祖輝煌大座道場九會趨蹡龍象諸方嗚呼莫道余舌頭太短實讚之玉出崑崗壬子春濮溪元老僧書繼老和尚讚雲彩正秋舒琅籤響石渠名山富仙跡太史待藏書天馬嘶偏壯霜鍾韻有餘平生霄漢志應袛古人如為古侄禪師靈巖儲稿素巖和尚讚古寺碧天舒湖山映水渠蓮開唐代瑞石勒竺墳書近睹芳叢振重興惠業餘頹宗今有賴法社自如如楚山真智草東崖和尚讚范蠡湖頭奕世雄兒孫濟濟展家風藕菴授受無多子倒卓烏藤吼象龍龍崖真璨草山容和尚讚至境難言物不遷帝青珠網豈常縣幻花滅處檀風動垢面清時佛眼旋摩竭令行親嫡骨靈山話在舊因緣剎竿今日重扶起慶喜當年有法傳大石法弟元昇具自培尊宿讚開疆闢土五葉聯鏢太湖波闊納百川潮目視雲漢相國裔表坐震頹綱誰犯秋毫咄活潑潑如盤珠走明歷歷亙赫光曒孤迥迥如峰卓朔峭巍巍志若凌霄香梵閣心德題古林如禪師傳師名機如號古林松江上海縣欽賜樂壽堂潘相國之裔孫也父號濟寰篤行誠實似上古人母沈賢德徽音著於親族閭里奉長齋信心佛果崇禎壬申年午月之三日誕生師臨產母夜夢手摘蓮華一朵頃之即結實清香馥郁自異覺遂生師師自為兒嬉戲時性好念佛惡食腥血之食及延傳訓讀穎悟超群年將冠父母繼喪師奉柩合葬祖塋遂矢志出家親族阻留者雲集堂中師志決不能強乃將父遺貲悉散之貧族臨行而誓曰吾不得蹤跡源頭為善知識不復寓形宇宙間矣遂飄然而去略無回顧若潛蛟之離幽壑而鯨鰲之縱大海洋洋自得也族黨咸歎曰異哉若子母氏之夢意在斯乎時順治庚寅歲大士誕日即拜投唯一禪師取字道雄晨夕苦行參究焚脩越一載自玉峰至流慶菴參二隱和尚遂披薙名機靈親炙久之繼往浙中遍叩諸方尊宿追尋話頭所至莫不敬契壬寅歲返鹿城選佛場禮參性空和尚乙巳至法輪受具後參婁東藕菴和尚問荅間水乳相合遂付衣拂更名機如號古林蓋丁未年事也師得法後益兢兢守道韞櫝多年戊申春玉峰紳士請住華藏寺師不受退隱嘉禾之金明纂刻佛祖世譜等錄於是嘉禾紳士以濮溪永正禪院請師復辭旋飛錫吳門遇古燈和尚謂師曰公得法藕菴多年連不受請甘踄歷諸方拄杖子無太勞耶師曰藕下兒孫有蓮自發應節順時許多活潑迨庚戌小春吳郡滸關西金墅鎮蓮華禪院席虛山主趙居士子漸仰師高風偕闔郡紳衿本鎮善士具書公請師乃撫杖而笑曰栽藕多時始見蓮耶能無媿乎因就請院本唐朝敕建古剎歲久蔓荒頹廢殆盡樹榦穿檐蘚苔生壁見者莫不蹙額寒心而師則情致悠然了不介意晨經暮課琅琅鐘磬聲無少間也且復躬耕隴畝戴笠披簑刈草為炊磨麩為食又未嘗以清澹為懷勤作為勞也如是者十年大殿鼎新佛像整容前後金彩霞光燦然奪目大非曩日境界此可以徵師之高道隆德有以格龍天而信檀那也雖然師生平所重正不徒是夫固有獨得至詣足以紹佛祖而覺愚蒙者又豈余小子寡聞膚見所能揄揚其萬一哉庚申春師編刻本師藕菴老和尚語錄以酬嗣法志願余小子輩因亦懇師平日語編為四卷同梓以傳師春秋方富精思銳志將來益廣慈悲心奮勇猛力所以雨露寰區甄陶學者正無可量敬述其已然者為余小子輩之模範云時康熙十九年庚申歲仲春朔弟子全素全威全學全榮等稽首拜撰金墅鎮文學檀越山主公啟伏以鷲峰直指一燈普照於九垓少室親承五葉流輝於亙古肯堂肯構代有哲人盡善盡美必推宗匠恭惟古林大和尚座下斷橋正傳藕菴嫡子鍾瑞氣於婁東蜚嘉聲於浙右揭開普明鴛老之生面播揚金明介祖之徽猷三千龍象隨高躅正合乘時萬里香雲擁法幢詎宜久晦茲有蓮華禪剎實惟古宿道場建立宗旨壓倒諸方今茲大和尚丕振家風扶起舊案璧合珠連紹箕裘於同室超凡越格震獅吼於遐方某等夙嚮鴻儀渴瞻猊旆雷轟電掣得嘗九轉之丹草偃風行頓脫三生之罥用勒俚箋佇延玉趾伏願高提祖印威風凜而狐犴全消丕展洪爐手段辣而皮膚盡脫將見大匠之門鮮曲木三草二樹而法雨均霑震雷之下無蟄蟲此界彼疆而光風一片某等臨啟曷勝景切之至法末張雋趙士毅趙士逵凌安國秦美趙士偉黃日起何一龍趙士弘徐章趙士俠蘇宜生秦嘉斌程學周趙羽趙士選惠德敷汪道忠惠和趙瑾仝頓首拜蘇州闔郡大護法公啟伏以一華拈起揭開古佛家風隻履攜歸直示西來祕旨五葉聯鑣於震旦一宗杰峙於滹沱時節既至法道攸彰恭惟古林大和尚座下鍾英泖水毓秀婁江乘願力以再來歷諸方而咸仰親承藕菴衍老之記莂執侍蠡湖介祖之維虔斷橋調古風高赤身擔荷車溪流長源遠獨力仔肩鹿城諸剎每虛席以殷勤檇李名藍咸捧幡而望切師方力行古道為法忘身意將振起頹綱潛蹤苦志顧祖印既已高提而龍天自難蓋覆入廛垂方便原係從上風規寶筏渡迷津未有長行不住惟茲蓮華禪院吾吳首剎尊宿古鄉領一郡關鎮之瑞氣作諸方雲水之津梁烹佛煉祖於前欽承古德開法闡宗於後端賴吾師蓋既烜赫於當時尤望顯揚於今日某等久儀道範佩切皈誠懷瓣香而趨會下勒譾語以表微忱伏願俯鑒凡情慨馳法旆運超方之手眼驅犴勦狐用本分之鉗錘利生接物天龍窺伺無門聖凡乞命有分將見鴛湖嫡派道風遍播寰區蠡水真傳法乳長流永古某等臨啟可勝翹切之至謹啟法弟李模范周繆彤彭瓏尤侗沈世奕徐乾學徐秉義徐元文申穟李楷朱雲周茂蘭蔣埴陸在新等仝頓首拜
