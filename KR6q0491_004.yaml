body:
  text: 侍者普觀露芳等記録機緣僧問無夢無想主人公在甚麼處安身立命師云拋綸橫臥柳溪邊僧云不會師云夜靜水寒休著餌扁舟載月洞庭西遂掩圓光數僧撞入方丈師云請坐喫茶一僧云大用現前何得說禮師拈棒便打又一僧喝云休要弄巧落節師云且道過在那裏衆擬議師云一隊掠虛漢盡打出僧問如何是清淨法身師云鮎魚上竹竿僧云意旨如何師云一日一千里僧禮拜師便打僧問吸盡西江水師今難下鉤師打云洞庭太湖心巨浪湧峰頭僧云好手不張名師又打云重賞之下師至彌陀寺有居士求開示師云俗士何不禮拜聻士云還作儒禮佛禮師云俱用不著士擬議師便喝士云請師別通箇消息師便打師牧牛僧問和尚是善知識為甚隨水牯牛腳跟轉師云住持不易僧回首師云吽吽一僧外入喚師師應諾僧云著賊了也師云甚麼時節僧擬開口師掌云原來不是師閲經題字問淳菴汝作麼生淳云昔有僧請益地藏以字不成八字不是未審是什麼字藏云看取下文注腳未審和尚如何指示師舉絶岸頌云汝因緣卻在者裏淳潛思少頃復問云還有別通底消息麼師乃喚淳菴淳欲應師振威一喝淳汗流頰背拜云原來者箇師攔胸把住云你見甚麼速道速道淳喝師托開云是即是是即不是淳忽有省便出僧問不思善不思惡如何是父母未生前本來面目師云眼觀月色僧云如何是已生面目師云耳聽風聲僧有省圓墓僧參正值春雪風雨師與衆茶筵問僧汝名甚麼僧云法弘師云法作麼生弘道道僧擬禮拜云求和尚慈悲師云風吹柳絮毛毬走雨打梨花蛺蝶飛淳菴在旁云人人自有箇箇不無因甚要代師云好與三十棒淳云慈悲太煞師云何不近前領話淳云某甲禮拜去也師云放汝一頓二僧新到師問一向在甚麼處僧云興化師云到者裏作麼僧擬議師便打顧旁僧云第二位道看僧云師唱誰家曲宗風嗣阿誰師云藕花香遍界翠色滿林梢僧進語師便喝僧云既闡濟上宗四境作麼說師云一一問將來僧云如何奪人不奪境師云憶昔王孫久不歸如何是奪境不奪人師云春風芳草曷勝悲如何是人境兩俱奪師云吹殘玉笛人千里僧云如何是人境俱不奪師云今日衷腸傾向伊僧云向上宗乘蒙指示覿面相呈句若何師云花雨繽紛飄滿座天風時送御爐香僧禮拜師云放汝三十棒蓮華六問太湖三萬六千頃且道源頭在那裏七十二高峰畢竟那峰為主五音拍板匝地普聞琵琶橋按調誰箇知音蓮華地湧香徹古今何故無人嗅著柏樹子庭前聳翠還有人覷著者麼滸墅關把斷要津因甚得到者裏僧問準提菩薩通身是手因甚被人偷去毗盧帽師云且放一線僧禮拜師便打僧云何故打某甲師復打云來說是非者便是是非人師呼行者抬梯來者云和尚有法為甚要某甲取師云無小人不成君子者喝師云我宗有四喝汝是第幾喝者擬議師連棒像讚初祖像讚登山涉水尋知己一到梁邦便失利指望魏土去拔本寥寥冷坐難出氣翻思恐賺後兒孫存何面目歸西去咦若無雪中人斷臂爭得血脈流此地觀音大士讚妙辨圓融應化無量手眼通身現真實相或示男女作人榜樣洛陽橋下賣風流金沙灘上身命放紫竹林間別一枝水月光中悉相向稽首大士持蠡捉蚌普賢大士讚行願洪深毛端示現華藏重重髑髏前見跨象雲霄任去來峨眉峰頂驅雷電金明老人讚兀坐蠡湖慈威並攝未跨船舷雷轟電掣不嗔唐土二三卻笑西天四七正法眼藏瞎驢邊滅逆順縱橫金明師翁曲中有直藕菴法華老人讚慣作白拈得自由眼光爍破碧天秋踏翻婁上江心月凜凜神威播四洲水香院唯一尊宿讚骨瘦崚嶒一幅鐵面及第心空阿誰敢羡水香院裏布旗鎗一喝分流如瓶瀉高坐巍然聞名見面咦自題者箇村僧神頭鬼臉手執白拂遭他撿點生平吐膽傾心換卻時人雙眼縱有丹青畫得來舌上風雷如電卷又讚一向藏身穩密何期夙債難酬幾番放下土面灰頭逢人話到關心處不覺哆啝較一籌任從衲子趣向也須拶透根由栽田博飯尋常事令人轉見亦風流流慶隱如老宿讚他道自居安樂我觀夙債現酬望修文殊智慧山高誰知普賢行海洪深仔細沉吟假作癡呆鉢盂懶去安柄直示英靈情性好翻貝葉廣度群迷咄一花五葉圖讚法脈傳流以貫通道行寰宇悉昌隆一天星斗咸瞻仰萬古須教徹聾玉峰自培叔讚齠齔入空門行波離規道浮屠翡點翠祖業家聲浩相見還他賓主句玉峰巔上立高標行實庚戌師住蓮華方丈衆請所述行由師云自慚鮮德不堪挂齒豈可今日播揚家醜乎奈事不獲已強以應命余乃上海欽賜樂壽堂潘相國裔孫父號濟寰母沈氏因父目疾移居崑山縣祖塋為業時生余於崇禎壬申年五月初三日卯時也自幼敬佛遊山禮塔擬欲脫塵奈何父母年老長兄先喪志期奉養親闈終日憂懷未決所向至十六歲父亡悲哀傷戚之情未敢忘也俄經歲月悠悠漾漾忽有雙人過舍促余觀劇因而感發遂出家禮本縣唯一禪師取字道雄落髮流慶菴年方二十四歲頃又遭母喪余即號天大哭恨不能報答劬勞如之奈何及久往浙遍參乃受戒法輪朝夕參究不思善不思惡阿那箇是父母未生前本來面目忽一日搬椅子觸發有省遂入方丈請益輪云不是心不是佛不是物是箇甚麼余曰杭州雷峰塔輪云又是物了也余曰莫錯會好輪云惟恐上座認奴作郎余曰明眼人前安敢造次輪云知即得余珍重而出偈曰透出娘生鐵面中縱橫無處不藏鋒拳破虛空揮佛祖山河大地一輪紅忽值沙汰時乃參藕菴老人一日飯罷余問搖脣鼓舌時如何老人將口水驀面一潑余始得脫然復至法輪執事追念法門未可報親恩於萬一居復何益因事絶退再參藕菴老人即充維那一日命入室才禮拜老人云釋迦老子因甚打失半邊鼻孔余云和尚與麼道那老人云真獅子兒余便喝老人云善能哮吼余又喝老人亦喝余禮拜老人說偈云當陽覿面提覿面當陽吼付於獅子兒不前亦不後遂付衣拂源流拄杖更名機如號古林時丁未年事也次命秉拂機緣不及盡述至戊申有師叔自培同諸紳襟請住玉峰華藏寺余念福薄退隱林下操道待龍天推出可耳即往禾之金明省覲師翁相見人事畢留住客寮匝月師翁特命監院事往返兩載不敢離於左右也庚戌秋承一老和尚及諸紳襟請住永正禪院余愧無能再拜懇辭復歸吳門謁蓮華古燈和尚一見命為西堂未及半載和尚因事意欲往浙率諸大檀將院事交託不慧余想法門道義斷不可辭勉力承任蓋庚戌冬也是時余住百物一空只得拖犁拽耙守拙待時已經八載殿堂佛像衆檀山主同心贊成不敢效古人土面灰頭淡泊自甘余之常分耳汝輩出家道流安可坐視叢林偷閒怠惰蓋不得已正是黃葉止啼之說諸人更須矢志向前真操實履毋效余之菲才未能出類拔萃也久立衆煩各自珍重衆禮謝而退修淨業十偈有箇扶桑金彈子光流懸鼓射西林幾多出格英靈士誰肯忙中惜寸陰終日阿彌意若何八功德水泛波羅六度之中齊合轍脫體風流轉更多倒腹傾腸為指迷悟迷切勿此中疑迷悟兩忘開正眼鑊湯爐焰是蓮池一句彌陀撇萬緣威儀寂靜體安然太虛寥廓窮三際九品蓮臺早現前樂邦元不在西東百憶分身掌握中聲色踢翻真絶唱天花搖散滿虛空晝夜彌陀十萬餘須知覿體見真如就中底事全收放卍字標胸定不移蓮花國土無關鎖歡樂場中有鐵圍透得目前情見過遙垂金臂願同歸託化蓮臺最勝緣髑髏拋去豈留連金波度過難遭想登岸休回般若船迥脫娑婆莫妄求菩提果證總無憂絶言詮處雷音震接引舒光上玉樓念佛如獅吼一聲群魔膽喪鬼神驚六時能把乾坤轉直踐西方路坦平和宋天封佛慈禪師蜜蜂頌匝地風和日暖時千紅萬紫采芳歸從今識得根源後更不隨行逐隊飛滿身香染別生涯奪得花魁旋入衙妙用縱橫渾足快兒孫濟濟自成家覺苑花敷正此時橫身直入絶支離看他赤手成家業不負重恩始暢脾鬧裏翻身逗曉光驚群出衆幾曾忙百花叢裏全提令毒尾鋒前孰敢當一枝春信透枯桐左右逢源處處通占盡風流無限意歸來衣錦帶花紅和宋金明一擊軒韻檐前指出莫驚持積翠叢中絶所知淡蕩高標清節操涼風劈面凜然吹疏疏密密數千竿抹雨衝煙徹骨寒自從擊著心空後直透威音那畔觀篩風拂月孰知音撲落清奇物外聞獨許香嚴明此意倩伊高節自懷君解籜清陰正此時披雲弄石動風微一聲劃破揮空令也助從前格外機己酉歲余在金明師翁處監院翁命到莊夜坐見月華而成偈碧空涵淨一輪明寶色光華奪兩睛匝地普天成片錦時人那見月中精火爆頌頂門一竅不通風惡性無明滿肚中快便相逢輕按著怒雷聲震耳雙聾風箏頌養成羽翮舞翩躚就下高飛奏碧天不律工商歌一曲夜來煙火灼雲顛窈窕風流徹體空虛凝一片白雲中生來俊骨沖霄漢豈逐旁觀別調功和瓶山蘭花頌空庭樹底久藏身忽爾花開劫外春秀挺一枝香遍界悠然不負古今真一自深埋已有年枝枝葉葉賽青蓮驚群別有清香質奪得熏風一著先幽香不是浪傳名曳杖來看種現成馥馥風流無限意何妨從此樂生平答問梅舜日法兄高標獨占上元時鐵骨稜稜只自知歷盡嚴寒丰韻別冰心猶笑萬花遲示尤淳菴居士偈桂馥蘭馨每共兼當人底事氣森然維摩今古門無別俊哉拶透火中蓮偈贈徐文儒居士多方相識意偏深一晤蓮華契妙音聞聽松風與鳥語大家來撫沒絃琴贈程從先居士訪道也曾偕野叟乘閒時亦話多難君今不負靈山囑扶起門前舊剎竿贈凌君禎居士百非關透氣如王鐵骨豪雄孝義雙彭老已經超歲月期君壽量共天長贈方順宇居士知君仗義更疏財八福良田任意栽始信靈根原有得真風一段自天來贈汪行可居士無絃琴細響孤清喜有流泉夜和鳴橋下琵琶彈不徹幾人能著眼中聽贈心目姪日誦千言萬句真就中一著最為親若還此處明機變報答師恩好立身示靈峰徒參學隨師繼古人莫生我慢起貪嗔庭前翠柏枝枝秀異日高撐絶比鄰示貫實徒學道始終無異心钁頭日用要親臨蓮華佛法無多子自是高流意獨森示靜軌徒汝今年少入空門著意朝參與暮昏要見本來真面目依然明月照前村示梨園偈風流年少如花窈歌向人前聲更巧百怪千奇演出場喚回幾箇知分曉徑山即事樓閣三千聳翠微五峰高卓顯全機橫擔竹杖凌霄頂喝石巖前驟步歸住天平山林覺寺常掩柴扉人罕知時聞幽鳥話多奇門緣塔卓靈巖近戶聳天平險峻支苔徑落花牽客興野橋曲澗動神思疏狂入世情難盡好闢青山更不違金明千佛閣上梯寶閣巍然日影低流鶯相顧去來啼一泓蠡水連天碧幾樹幽林帶鳥棲南望鴛湖源浩渺北窺檇李路蹺蹊門前車馬紛紛過喬木森森繞座齊玉峰塔直上凌霄勢巍峨插漢標清風來匝地遠送鐸聲高訪白雲寺淡宕山雲高復低萬峰端肅拱天齊清泉一派流香咽滿目松篁送鳥啼訪吳菴九龍環翠繞檐楹悵望蘇臺舊盛名迢遞路窮人不到門蘿緣徑話難頻初住蓮華疏籬破屋實堪愁喜有深林鳥語幽湖上有山雖未隔夜來漁艇近滄洲燈油偈續焰聯輝不夜天光吞萬象勝莊嚴渠能莫若親垂手百福彌增壽愈堅一點孤懸琉璃殿亙古不磨示方便萬象森羅影現中重重爍破瞿曇面村居六偈平生心性出余癡任意隨緣總是宜臨風一曲陽春調試問男兒知未知古德居山我隱村钁頭終日有高論及時莫使荒多技布種嘉苗到眼跟垢面生嫌百結衣糠團麥粥療余饑片片雪花飛滿室繩床冷坐憶楊岐鄉居誰不漸擔憂世事生平懶應酬冷熱門庭誇自得從他喚馬亦呼牛高堂庭敞似雲深萬朵晴巒匝座陰風送好帆歸遠岫一輪皎皎印湖心荒郊何處子規啼門徑殘紅砌落暉舉步回廊香脈脈幾多佳景點苔飛佛事藕菴先老和尚靈骨至寺入塔師拈香云此瓣香難以提不可放今日虔爇爐中供養昔年曾過此山本師藕菴大和尚送入多子淨寶幢內萬彙吉祥長安長樂四隅熙寧十方慶泰新緣青溪繞殿閣晴光瑞氣布寰區且道我先師復來一句又作麼生遂焚香云者段風流邁今古巍然端坐視蓮花為道生禪師起龕卓拄杖云出門一句為君通剔起眉毛不見蹤珍重此時須快便從教步步駕清風舉火師拈火炬云恭惟道生本公世壽三十餘年僧臘已經八載林下水邊不受羅龍玉峰頂上嘯月吟風蓮華雖與同條生不與同條死即今諸尊宿輩命吾為公茶毗一句又作麼生擲火炬云紅爐焰上翻身去靉靆雲中笑點頭入塔二月東風嶚峭寒凍梅乍吐玉珊珊多子塔前分瑞色春光占斷白龍潭遂送入云珍重為月池老宿火榴花紅映娘生面競渡流中弔屈原今日踏翻重舉出更餘高步為君宣且道那一步擲炬喝一喝入塔舉靈骨云火滅灰飛月落池光吞萬象正相宜從空放下君須委穩步前行更不移且道路頭在甚麼處隨送入云流水下山非有意片雲歸洞本無期為本寺文源行者火拈火炬云桂花香裏傳消息梧葉飄飄送晚秋且道此行何處著白蘋紅蓼兩悠悠便擲下為方順宇居士童男千波萬狀出頭來十載餘春又入胎劬勞未報時當蹇乳哺空酬命運乖莫謂蓮華多饒舌為伊顯示絶疑猜亦感繫珠還可否化城切勿意徘徊埋義犬語異類其形掉尾猙獰風霜不避二八餘春若見不良舍命忘身此時正好得力何其債足竟行我若不藏土你凌辱難禁咄即今脫盡皮毛去換來面目證無生山主趙士逵室人吳氏法名全元敬梓願成證覺板存楞嚴藏流通
