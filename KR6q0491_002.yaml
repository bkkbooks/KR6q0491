body:
  text: 侍者全勝全榮等記録住蘇州府金墅鎮蓮華禪寺晚參舉一初老和尚永正開法時昔斷大師為侍者問靈雲自從一見桃花後直到如今更不疑為甚玄沙道敢保老兄未徹在尚曰直不藏曲斷云未審徹底人分上如何受用尚曰饑來喫飯倦時打眠師云問得也當答得也奇諸兄弟且道他父子有何長處衆下語俱不契師自代云敲唱風流閒賣弄調龍馭象鎮東溪小參豎拄杖云亙古亙今恆不昧一回舉起一回新諸兄弟欲識佛性義當觀時節因緣時節若至其理自彰如何是自彰底道理聻九九八十一犁耙一齊出於此會得便能高超物外獨步大方其或未然急將本參話頭在三條椽下七尺單前猛力參究刻刻提撕直須究到無可奈何處忽然打失鼻孔㘞元來在這裏信知方丈為衆助喜何故鴛鴦繡出丁香結珍重諸君著眼看便起小參舉金明師翁徑山雪嶠大師上堂翁白推竟雪喝一喝下座有僧請益翁翁乃拈偈示之師云這兩箇老漢直教人疑著檢點將來也是焦磚打著連底凍設有問蓮花只向他道呂望六韜黃公三略諸仁者於此會得同一鼻孔出氣若未委更聽一偈椎喝雄雄勢已彰諸方知有絶商量彼此和盤親擲出至今馥馥有餘香因事小參揮拂子云大凡僧家赤心片片見義勇為須要法法上明頭頭上顯剛柔相濟權實相應出語不虛發發則中的不中的是語滲漏更若話過頭大難收拾抱道高流貴在默然即此一默可證無諍三昧一行三昧自受用三昧不妨於此土他方不論是幻非幻智慧無明隨機方便拔濟群迷不見永嘉大師道無明實性即佛性幻化空身即法身金明師翁云諸佛出世入世皆得無諍三昧引導衆生諸祖以心印心盡契無生之旨接續慧命若總與麼彼此人我商量佛祖正脈豈到今日耶諸兄弟以此觀之大須仔細貴要真操實履到這田地方得自由有分以警將來各各珍重祈晴小參師以拂子打圓相召衆云會麼萬里不挂片雲日面月面皎潔林間光明頓現大地山河氣自蘇蓮華不必多饒舌揮拂子下座小參舉保寧勇上堂風鳴條雨破塊晚來枕上鶯聲碎蝦蟆蚯蚓一時鳴妙德空生都不會都不會三箇成群四箇作隊窈窈窕窕飄飄颻颻向前村後村折得梨花李花一佩兩佩師云保寧老漢提唱宗旨大有風流儒雅意句尖新未免落在聲色情見衲僧向上巴鼻未可得在衆中若有透聲色情見衲僧出來山僧拄杖相見一僧才出禮拜師云三十棒且待別時來便下座本寺護法徐文儒居士生忌孝子志寧請師對靈小參師云夫子行道齊家治國理貫古今吾佛說法廣度衆生轉凡成聖惟文儒檀護生耶榴火炎炎猿啼由頂胸藏錦繡目極群書正在山僧丈室和泥合水有話未終誰知撩起便行熏風拂拂鶴唳吳山惜乎你五十六年一場好夢即今到此還醒麼若也醒得鬧市紅塵無非極樂天涯海角盡是蓮邦且道他後嗣一句如何話會以拂子打相云日照長流千澗水風調果熟萬山紅元旦千佛懺期小參問慢提向上且道三千諸佛居何國土師云展兩手琉璃殿內進云恁麼則箇箇霑恩去人人腳下穩師云布心膽瑪瑙街前進云祝聖裕民一句又作麼生師云干戈永息邦家樂豆麥禾苗勝舊年僧禮拜云謝師答話師云逢人切莫錯舉乃云問答須知玄要臨機顯發縱擒料揀照用齊施方能光揚佛祖超脫死生即今四衆臨筵各各歸家活計如何施設以拄杖作云若在山僧拄杖頭邊得者消息去不惟衲僧了悟心宗邦家亦且鎮治儒生及第農植全收工藝精良經商倍利絲毫功不浪施卓一卓云八十翁翁入場屋真誠不是小兒嬉示衆箇事分明要說便說觸著磕著要歇便歇黃鸝上樹一枝花白鷺下田千點雪別別大地山河太饒舌顧左右云且道說箇甚麼喝一喝遂起身歸丈室因事示衆繼跡名藍八載餘龍天神護賴相棲殿堂佛像檀那力山主虔心衆盡依莫謂山僧重舉示調達苗裔倀瞋癡平地風波還自悉百般技量總成虛八萬四千他自造病眼空花見魈鬾即今據證萬別坐斷千差一句又作麼生遂作此相云明得箇中玄要處神通妙法不思議示衆舉孚上座因鼓山赴大王請雪峰門送回至法堂曰一隻聖箭直射九重城裏去也孚云是伊未在峰曰渠是徹底人孚云若不信待某甲去勘過遂至中路便問師兄向甚麼處去山云九重城裏去孚云遇三軍圍繞時如何山云他家自有通霄路孚云恁麼則離宮失殿去也山云何處不稱尊孚拂袖便回峰問如何孚云好隻聖箭中路折卻了也遂舉前話峰乃曰奴渠語在孚云老凍儂猶有鄉情在師云雪峰畫蛇添足孚上座平地興波鼓山雖是小勇大敵正眼觀來略較一籌若問蓮華三軍圍繞時如何聲未絶劈脊便打何故聖箭話行便下座示衆舉普明和尚時將永明偈問雲峰鈞和尚云化人問幻士谷響答泉聲欲達吾宗旨泥牛水上行意旨如何鈞云夢眼見空花明云空花事作麼生鈞云莫將耳聽明又問臨濟祖翁有一句子你作麼生道鈞便喝明便打鈞又喝明又打鈞禮拜明云元來是瞎驢子鈞拂袖便出師云普明有拔山舉鼎手段雲峰具定乾坤底眼目只是話作兩端各與三十拄杖何故棒頭敲出虛空髓遍界英風吹腦疼珍重下座示衆舉金明進和尚問藕菴衍和尚殃崛産難因緣你作麼生菴作呱呱聲明云是男是女菴珍重作禮明便打師云金明意興未闌拋綸擲釣藕菴腦門著地河漢星輝顧左右拍几云會麼從空放出擒犀手驀地掀翻海嶽來竟下座示衆舉藕菴和尚因雷雨夜坐僧問如何是真法菴云檐聲未斷連宵雨電影還催後夜雷僧有省師云若道者僧悟去入地獄如箭射若道者僧不悟去亦入地獄如箭射何故聻滴破髑髏浸爛鼻孔便起上三塔主峰老和尚供師云一泓蠡水派接龍淵波揚四海白浪滔天挽頽風於舊日雷奔電閃整條令於金明攫霧拏煙即今端坐窣堵波一句如何為人直截良久云憶昔當年留別意痛腸寸裂為誰宣展具禮拜上藕菴先老和尚供師拈香云朔風括耳度寒江一片水心叩影堂法幢傾落霜天月難把衷腸家醜揚堪羡生平書藏典見多寶塔自安藏今日爐中方見膽焦螟眼裏繡鴛鴦展具拜除夕示衆云諸方熱鬧摘葉尋枝高搭松棚圍爐柮榾爭如得者裏冷淡直截薄披明月細切清風任汝橫咬豎嚼忽然咬著始信蓮華太為人一時肝膽盡皆傾示衆春色紛紛花滿枝黃鶯啼切柳垂絲見義勇為豪氣爽方名出格丈夫兒示衆汾陽紙陌散閒神葉縣潑水驗新到二老如斯振祖綱拍盲向汝癡禪道蓮華炊飯待高流活煮清泉款新到你不我兮主即賓博飯栽田聲浩浩示衆云出家切須真心學道莫先躲懶偷閒事事實行到底件件方便周旋弄巧定然成拙虛頭詐詭覷破何顏硬強不能遷善噬臍那值半錢諸人若還不信請看果報昭然重陽示衆九月九日重陽節金風颯颯飛紅葉籬菊凌霜吐晚馨林下禪和甘抱拙笑他世俗插茱萸何似蓮華更饒舌別別太湖波底撈明月小參舉僧問雲峰如何是心地法門峰云不從人得僧云不從人得時如何峰云此去衡陽不遠大慧云雲門即不然如何是心地法門不從人得不從人得時如何看腳下師云二老漢恁麼提持大似之乎者也未為直截在若問蓮華如何是心地法門不從人得不從人得時如何劈脊便棒免教伊隨處著倒端午小參僧問如何是蓮華境師云湖光山色秀鬧市接溪橋進云如何是境中人師云丫角健兒騎艾虎破簑漁子網鮮鱗進云人境已蒙師指示向上宗乘事若何師豎拄杖云會麼僧禮拜師便打乃云年年五月五處處貼靈符健兒騎艾虎醽醁泛菖蒲當門書大吉隨例斬妖魔妖魔風愈熾狂見總懡㦬召衆云且道具甚麼作略得妖魔平復去喝一喝云若有箇漢出來道不書大吉不貼靈符百怪殄滅白舌消磨百草頭信手拈來是藥便能興波作浪不向死水浸殺似三閭大夫是即是爭奈蓮華門下正好喫棒在何故聻復喝云座中自有江南客休向尊前唱鷓鴣便下座小參舉馬祖因僧問離四句絶百非請師直指西來意祖云吾今日勞倦不能為汝說問取智藏去僧問藏藏曰何不問和尚僧曰和尚教來問藏曰我今日頭痛不能為汝說問取海兄去僧問海海曰我到者裏卻不會僧乃舉似祖祖曰藏頭白海頭黑師云馬祖父父子子雖然逼到水盡山窮各各原有轉身吐氣爭奈者僧將登九仞止缺一步卻被他哄得東走西奔又添說白道黑換卻眼睛要且西來意總未會在若有人問蓮華離四句絶百非請師直指西來意但云今日不答話免使勞倦頭痛至節示衆小春才過又隆冬時序頻催豈定蹤諸仁欲覓根源處霜飛葉落在其中
