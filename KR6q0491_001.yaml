body:
  text: 侍者全威全湧等記録住蘇州府金墅鎮蓮華禪寺康熙庚戌仲冬朔旦入院山門重整人天路打開方便門欲明安樂處須向這裏入拽拄杖竟進佛殿古來不著求心光淨無礙兩眼對兩眼常禮如自在展大具拜伽藍靈聰顯赫輔國護僧一呼百諾速報分明插香祖堂四七二三口帶雌黃何故插香云昔從五鳳樓前過不解思惟坐太平據室拈拄杖云豎窮三際橫遍十方聖凡相見喫棒有分何故卓一卓云律令森嚴諸大檀護山主耆宿衆等尋懇上堂師至座前拈疏云人天眼目佛祖綱維檀護金湯衲僧法標汝等普聞也須剖露宣畢指法座云這曲木彔床巍巍堂堂龍天推出貴在承當喝一喝便升座遂拈香云此一瓣香乾坤至大萬德以仁炳向寶爐端為祝延今上皇帝聖壽無疆萬萬歲欽願垂裳治國海晏河清八方共沐堯風四表同遵舜化次拈香云此一瓣香調和鼎鼐位列三台炳向寶爐奉為滿朝文武合國勳戚當道尊官紳襟文學遠近檀那護法山主合寺耆宿伏願生生受靈山記莂世世端秉帝心復拈香云此一瓣香忒煞分明天然貴胤把住關津不通凡聖炳向寶爐專為供養傳臨濟正宗三十二世住婁江藕菴堂上法華老人本師和尚用酬法乳斂衣就座永寧白椎云法筵龍象衆當觀第一義師云若論第一義諦非言句所及還有向山僧未出方丈時薦得者出衆相見僧問水壺影鑑舊日風規癖掃煙霞還成窠臼即今條令斬新一句如何舉唱師云太湖三萬六千頃進云恁麼風前不露彩句後絶蹤由師云疊疊青山插遠村進云心心相對眼眼相覷雲門道菴內人不知菴外事因甚乾峰呵呵大笑師云快便難逢進云蓮華堂上果與不同師云合取口好乃云古殿洞開明輝杲日坐振頽綱承誰妙力驀豎拂子云者便是佛佛授手祖祖相傳底一段大事山僧自丁未年間劈頭撞著這老漢一拶直得脫體無私一肩擔荷今因業風吹至蓮華承諸檀護延請住持奈何時不可緩義弗敢辭對衆分明舉揚去也把住也靈光獨耀放行也頭正尾正且問大衆即今還是放行耶把住耶遂揮拂云寒焰發輝充宇宙從教匝地湧蓮華謝辭不録復舉淨慈斷橋倫祖上堂云德山低頭夾山點頭俱胝豎起手指頭玄妙𡎺破腳指頭拈拄杖云都來不出山僧拄杖頭何以見得卓一卓云一葉落天下秋師云當堂不正坐那赴兩頭機若非具透關眼焉能辨其緇素呈拂子云者一隊老古錐今日被蓮華一串穿卻了也為甚如是一朝權在手便把令來行卓拄杖一下復結椎云諦觀法王法法王法如是便下座當晚小參娑婆世界以音聲為佛事香積世界以香飯為佛事金明師翁以破院為佛事蓮華則不然以行門為佛事何故拈香擇火堂前解打禾山鼓緊峭草鞋大家同入雲門普搬石運土發機須用千鈞弩阿呵呵大地原來無寸土便歸方丈新春上堂揮拂云春山青疊疊春水緣滔滔靈禽解語萬物同條才子佳人休作景會松岡苔徑且漫崢嶸蓮花一向內不放出外不放入坐斷乾坤又作麼生解嘲良久云浮雲散盡紅輪曜古木參天月挂梢拽拄杖下座元旦上堂祝聖畢拈拂子作吹笙勢云一曲翻來格調新梅花枝上報先春蓮華有句超群象曆日無私降紫宸拂一拂云揮斷七十二峰傾秋倒喝一喝云喝退三萬六千水逆流何故丈夫各有沖霄志豈向他人行處行便下座四月八日上堂舉世尊降生時一手指天一手指地周行七步目顧四方乃曰天上天下唯我獨尊古今批判者竟不顧世尊性命祇要各出手眼殊不知救得蝦蟆死了蛇大衆且喜舊案新翻還識釋迦老祖娘生面目麼豎拂子云鉤頭有餌慣釣鯤鯨把住封疆渾身賣悄復揮下座中秋修建大殿落成華嚴經期圓滿衆信勝集請上堂師云法無定相遇緣即宗古迹重光亦須時節此寺自唐朝劉公夫婦捨宅以來千有餘年復得趙居士合家善眷捐資修葺茲當圓成之日衆善信恭命山僧舉揚大法以為慶賀直得森羅起舞萬象點頭虛空合掌大地和南三世諸佛神通自在以智慧光明威德充滿而令青蓮華藏菩薩住佛無畏入佛法界一一莊嚴一一具足汝等諸人還信得及麼若信得及此處於青蓮華藏世界無二無別現前諸善男子善女人與彼土諸大菩薩無二無別昔日劉公今時趙老亦無二無別其或未然更聽一偈蓮華復現度人舟盡入如來性海遊天香到處秋光好直蹈毗盧最上頭卓拄杖喝一喝下座上堂舉雪峰因僧來參峰問甚處來僧云浙中峰云船來陸來僧云二途俱不涉峰云怎得到這裏僧云有甚麼隔礙峰即打趁出僧後十年再來峰云從甚處來僧云湖南峰云湖南與此間相去多少僧云不隔峰舉拂云還隔這箇麼僧云若隔怎得到這裏峰亦打出僧住菴後每見人必罵雪峰同行聞特去相訪遂問你因甚罵雪峰這僧舉前兩段因緣同行痛罵與伊點破這僧遂悲泣每於中夜焚香望雪峰禮拜師云雪峰與麼為人但有殺人劍無活人刀那同行點破矢上加尖漏逗不少這僧當時罵而今哭兩頭三面自起自倒蓮花今日據款結案各與三十拄杖何故聻劍為不平離寶匣藥因救病出金瓶便下座佛誕日開光趙山主室人吳氏法名全元請上堂撲面熏風四月天黃鶯啼出柳枝煙座下若有英靈客何必山僧費口涎豎拂子云今朝初八聖誕節我佛出頭便饒舌叵耐旁觀惡水澆這點光明無間歇趙氏全元請舉揚拔盡諸人眼中楔時雨紛紛正令提箇事明明難辨別休辨別香煙堆裏金鳳飛紅炬光中玉龍抉高聲召衆云諸人還見麼遂擲下拂子復舉南泉和尚云王老師自小養一頭水牯牛擬向溪東牧未免犯他國王水草擬向溪西牧未免犯他國王水草不如隨分納些些師云王老師恁般提唱固是可嘉未免犯他國王水草爭如蓮華日用拖犁耙拽將松岡下八角井邊一片田地翻來覆去夏種秋收脫粟香糜快樂自在豈不勝他王老師一頭地衆中倘有箇漢出來道和尚是甚麼心行卓拄杖云你也出者圈繢不得呵呵大笑下座上堂舉凌行婆問浮杯盡力道不得底句分付阿誰杯云浮杯無剩語婆云未到浮杯不妨疑著杯云更有長處不妨拈出婆斂手哭云蒼天中更添怨苦杯無語婆云語不知偏正理不識倒邪為人則禍生後僧舉南泉泉云苦哉浮杯被這老婆推折一上婆聞得笑云王老師猶少機關在時有幽州澄一禪客詣婆乃問南泉為甚少機關婆哭云可悲可痛澄罔措婆云會麼澄合掌而立婆云伎死禪和如麻似粟後澄一舉似趙州州云我若見這臭老婆問教伊口啞一云未審和尚作麼生問伊州便打一云為甚卻打某甲州云似這般伎死禪和不打更待何時婆聞云趙州合喫婆手中棒州聞哭云可悲可痛婆聞歎云趙州眼光爍破四天下州聞令人去問如何是趙州眼婆豎起拳僧回舉似趙州州乃有頌與婆云當機覿面提覿面當機疾報爾凌行婆哭聲何得失婆有頌答云哭聲師已曉已曉復誰知當時摩竭令幾喪目前機師云這婆子將此一問直得放火燒山總成妖怪浮杯雖則謙恭益遜不無閉門種火南泉一語也似火上添油趙州救火看樓打樓若無澄一焦頭爛額如何圓得此案還有息火者麼良久云輪得自己贏得他人擲拄杖下座因吳氏全元送法衣上堂師舉衣云華頂家聲遠車溪法脈長鴛湖流此地蓮花遍界香昔者龍女獻珠世尊納受即證菩提今日全元供衣山僧承受且道是同是別良久搭衣云體段分爻象羅紋挂福田便下座上堂拈拄杖云有物先天地無形本寂寥能為萬象主不逐四時凋復卓一卓云喚則拄杖子則觸不喚作拄杖子則背諸人試撿點看若是隨陰陽消長寒暑變遷總屬枝上牽枝蔓上引蔓莫為汝等打葛藤去也驀卓杖云鴛鴦繡出從君看不把金針度與人下座端陽上堂今朝五月五便是端陽節咒水與書符赤口盡消滅別別艾虎龍舟最親切蓮華更有一句子不向諸人説且道那一句良久云角黍大如錐榴花紅映月下座觀音聖誕衆設供請上堂雀噪鴉鳴盡入觀音妙裏水流風動無非佛祖真機若將耳聽瞎卻諸人眼若將眼覷塞卻諸人耳不見雲門道聞聲悟道見色明心觀音菩薩將錢買胡餅放下手來卻是饅頭又作麼生慶讚擊拂子云普門示現神通力海晏河清一并收下座上金明寺介菴先老和尚供師云范蠡湖頭建法幢立宗旨四海之內無不共聞到今撒手敢獻香糜仰企師翁先老和尚本無生滅豈有去來祗如末後垂恩一句又作麼生遂插香云大法痛心難話會兒孫到此亦觀瞻展具禮拜
